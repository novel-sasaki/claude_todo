<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="サイドバー切り替え">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span>Claude Todo</span>
      </div>
    </div>
    <div class="header-center">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="タスクを検索... (Ctrl+K)" autocomplete="off">
        <kbd class="search-shortcut" id="searchShortcut">Ctrl+K</kbd>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" aria-label="テーマ切り替え">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-label">表示</h3>
        <nav class="filter-nav">
          <button class="filter-btn active" data-filter="status" data-value="all">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            すべて
            <span class="count-badge" id="countAll">0</span>
          </button>
          <button class="filter-btn" data-filter="status" data-value="active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            未完了
            <span class="count-badge" id="countActive">0</span>
          </button>
          <button class="filter-btn" data-filter="status" data-value="completed">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            完了済み
            <span class="count-badge" id="countCompleted">0</span>
          </button>
          <button class="filter-btn" data-filter="status" data-value="today">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            今日
            <span class="count-badge" id="countToday">0</span>
          </button>
          <button class="filter-btn" data-filter="status" data-value="overdue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            期限超過
            <span class="count-badge overdue" id="countOverdue">0</span>
          </button>
        </nav>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-label">優先度</h3>
        <nav class="filter-nav">
          <button class="filter-btn" data-filter="priority" data-value="all">
            <span class="priority-dot" style="background:var(--text-secondary)"></span>
            すべて
          </button>
          <button class="filter-btn" data-filter="priority" data-value="high">
            <span class="priority-dot high"></span>高
          </button>
          <button class="filter-btn" data-filter="priority" data-value="medium">
            <span class="priority-dot medium"></span>中
          </button>
          <button class="filter-btn" data-filter="priority" data-value="low">
            <span class="priority-dot low"></span>低
          </button>
        </nav>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label-row">
          <h3 class="sidebar-label">カテゴリ</h3>
          <button class="add-category-btn" id="addCategoryBtn" aria-label="カテゴリ追加">+</button>
        </div>
        <nav class="filter-nav" id="categoryNav">
          <button class="filter-btn active" data-filter="category" data-value="all">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
            すべて
          </button>
        </nav>
      </div>

      <div class="sidebar-footer">
        <div class="progress-section">
          <div class="progress-header">
            <span>今日の進捗</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="main-header">
        <div class="main-title-row">
          <h1 class="main-title" id="mainTitle">すべてのタスク</h1>
          <div class="sort-group">
            <label class="sort-label" for="sortSelect">並び替え</label>
            <select class="sort-select" id="sortSelect">
              <option value="order">カスタム順</option>
              <option value="dueDate">期限日</option>
              <option value="priority">優先度</option>
              <option value="createdAt">作成日</option>
              <option value="title">タイトル</option>
            </select>
          </div>
        </div>
        <div class="bulk-actions" id="bulkActions">
          <button class="bulk-btn" id="completeAllBtn">すべて完了</button>
          <button class="bulk-btn danger" id="clearCompletedBtn">完了済みを削除</button>
        </div>
      </div>

      <!-- Quick Add -->
      <div class="quick-add-box">
        <button class="quick-add-icon" aria-label="追加">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <input type="text" class="quick-add-input" id="quickAddInput"
               placeholder="タスクを追加... (Enter で追加、詳細は右の + ボタン)" autocomplete="off">
        <button class="quick-add-detail-btn" id="openModalBtn" title="詳細設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
          </svg>
        </button>
      </div>

      <!-- Todo List -->
      <div class="todo-list" id="todoList">
        <div class="empty-state" id="emptyState">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          <p>タスクがありません</p>
          <span>上の入力欄からタスクを追加してみましょう</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">タスクを追加</h2>
        <button class="modal-close" id="modalClose" aria-label="閉じる">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editingId">
        <div class="form-group">
          <label class="form-label" for="todoTitle">タイトル <span class="required">*</span></label>
          <input type="text" class="form-input" id="todoTitle" placeholder="タスクのタイトル" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="todoDesc">メモ</label>
          <textarea class="form-textarea" id="todoDesc" placeholder="詳細メモ（任意）" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="todoPriority">優先度</label>
            <select class="form-select" id="todoPriority">
              <option value="medium">中</option>
              <option value="high">高</option>
              <option value="low">低</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="todoDue">期限日</label>
            <input type="date" class="form-input" id="todoDue">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="todoCategory">カテゴリ</label>
          <div class="category-input-row">
            <select class="form-select" id="todoCategory">
              <option value="">なし</option>
            </select>
            <button type="button" class="new-category-btn" id="newCategoryBtn">+ 新規</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">キャンセル</button>
        <button class="btn btn-primary" id="modalSave">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Keyboard shortcuts hint -->
  <div class="shortcuts-hint" id="shortcutsHint">
    <div class="shortcuts-grid">
      <kbd>N</kbd><span>新しいタスク</span>
      <kbd>Ctrl+K</kbd><span>検索</span>
      <kbd>D</kbd><span>ダークモード</span>
      <kbd>?</kbd><span>このヘルプを閉じる</span>
    </div>
  </div>

  <button class="fab" id="fab" aria-label="タスクを追加 (N)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
